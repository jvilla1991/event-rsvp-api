name: CI/CD — API

on:
  push:
    branches: [main]
  workflow_dispatch:

# Serialize deploys: a second push queues behind the running deploy instead of
# racing it into App Runner's OPERATION_IN_PROGRESS error.
concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: event-rsvp-api
  ECR_REGISTRY: 204318838594.dkr.ecr.us-east-1.amazonaws.com
  ECS_CLUSTER: event-rsvp-prod-migrations
  ECS_TASK_DEFINITION: event-rsvp-prod-migration

jobs:
  # ── 1. Run all test projects ───────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore EventRsvpApi.sln

      - name: Run Domain tests
        run: >
          dotnet test tests/EventRsvp.Domain.Tests/EventRsvp.Domain.Tests.csproj
          --configuration Release
          --no-restore
          --logger "trx;LogFileName=domain.trx"

      - name: Run Application tests
        run: >
          dotnet test tests/EventRsvp.Application.Tests/EventRsvp.Application.Tests.csproj
          --configuration Release
          --no-restore
          --logger "trx;LogFileName=application.trx"

      - name: Run Infrastructure tests
        env:
          ASPNETCORE_ENVIRONMENT: Testing
        run: >
          dotnet test tests/EventRsvp.Infrastructure.Tests/EventRsvp.Infrastructure.Tests.csproj
          --configuration Release
          --no-restore
          --logger "trx;LogFileName=infrastructure.trx"

      - name: Run API tests
        env:
          ASPNETCORE_ENVIRONMENT: Testing
        run: >
          dotnet test tests/EventRsvp.Api.Tests/EventRsvp.Api.Tests.csproj
          --configuration Release
          --no-restore
          --logger "trx;LogFileName=api.trx"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: "**/*.trx"

  # ── 2. Build Docker image and push to ECR ─────────────────────────────────
  build-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: [test]
    # The deploy role's OIDC trust is pinned to this GitHub Environment (§B8.2) —
    # without it the AssumeRoleWithWebIdentity sub claim won't match.
    environment: production
    permissions:
      id-token: write
      contents: read
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}
      ecr-registry: ${{ steps.login-ecr.outputs.registry }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.meta.outputs.tag }}
        run: |
          docker build -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" .
          docker tag "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"

  # ── 3. Run EF migrations via a one-off ECS Fargate task ───────────────────
  migrate:
    name: Migrate DB
    runs-on: ubuntu-latest
    needs: [build-push]
    # The deploy role's OIDC trust is pinned to this GitHub Environment (§B8.2) —
    # without it the AssumeRoleWithWebIdentity sub claim won't match.
    environment: production
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run migration task
        # Runs the ECS Fargate migration task using the latest image in ECR.
        # The build-push job pushes to :latest immediately before this step
        # so latest always points to the image we just built.
        id: run-task
        run: |
          TASK_ARN=$(aws ecs run-task \
            --cluster "$ECS_CLUSTER" \
            --task-definition "$ECS_TASK_DEFINITION" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ secrets.ECS_MIGRATION_SUBNETS }}],securityGroups=[${{ secrets.ECS_MIGRATION_SG }}],assignPublicIp=ENABLED}" \
            --overrides "{\"containerOverrides\":[{\"name\":\"migration\",\"environment\":[{\"name\":\"MIGRATE_ONLY\",\"value\":\"true\"}]}]}" \
            --query "tasks[0].taskArn" \
            --output text)
          echo "task-arn=$TASK_ARN" >> "$GITHUB_OUTPUT"
          echo "Migration task started: $TASK_ARN"

      - name: Wait for migration task to complete
        env:
          TASK_ARN: ${{ steps.run-task.outputs.task-arn }}
        run: |
          echo "Polling ECS task status..."
          for i in $(seq 1 36); do
            STATUS=$(aws ecs describe-tasks \
              --cluster "$ECS_CLUSTER" \
              --tasks "$TASK_ARN" \
              --query "tasks[0].lastStatus" \
              --output text)
            echo "  attempt $i: $STATUS"
            if [ "$STATUS" = "STOPPED" ]; then
              EXIT_CODE=$(aws ecs describe-tasks \
                --cluster "$ECS_CLUSTER" \
                --tasks "$TASK_ARN" \
                --query "tasks[0].containers[0].exitCode" \
                --output text)
              if [ "$EXIT_CODE" = "0" ]; then
                echo "Migrations completed successfully."
                exit 0
              else
                echo "Migration task failed with exit code $EXIT_CODE"
                echo "CloudWatch logs: https://${{ env.AWS_REGION }}.console.aws.amazon.com/cloudwatch/home?region=${{ env.AWS_REGION }}#logsV2:log-groups/log-group//ecs/event-rsvp-prod-migration"
                exit 1
              fi
            fi
            sleep 5
          done
          echo "Timed out waiting for migration task."
          exit 1

  # ── 4. Update App Runner to use the new image ─────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [migrate]
    # The deploy role's OIDC trust is pinned to this GitHub Environment (§B8.2) —
    # without it the AssumeRoleWithWebIdentity sub claim won't match.
    environment: production
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Wait for service steady state
        # App Runner rejects updates while a previous operation is in progress
        # (e.g. an earlier deploy still rolling). Wait until the service is RUNNING.
        run: |
          for i in $(seq 1 40); do
            STATUS=$(aws apprunner describe-service \
              --service-arn "${{ secrets.APPRUNNER_SERVICE_ARN }}" \
              --query "Service.Status" --output text)
            echo "  pre-deploy check $i: $STATUS"
            if [ "$STATUS" = "RUNNING" ]; then exit 0; fi
            sleep 15
          done
          echo "Service never reached RUNNING; cannot deploy." ; exit 1

      - name: Update App Runner service image
        env:
          IMAGE: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
        run: |
          for attempt in 1 2 3; do
            if aws apprunner update-service \
              --service-arn "${{ secrets.APPRUNNER_SERVICE_ARN }}" \
              --source-configuration "{\"ImageRepository\":{\"ImageIdentifier\":\"$IMAGE\",\"ImageRepositoryType\":\"ECR\"}}"; then
              echo "App Runner update triggered for image: $IMAGE"
              exit 0
            fi
            echo "update-service attempt $attempt failed (likely OPERATION_IN_PROGRESS); retrying in 60s..."
            sleep 60
          done
          echo "update-service failed after 3 attempts." ; exit 1

      - name: Wait for App Runner deployment
        run: |
          echo "Waiting for App Runner to reach RUNNING state..."
          for i in $(seq 1 60); do
            STATUS=$(aws apprunner describe-service \
              --service-arn "${{ secrets.APPRUNNER_SERVICE_ARN }}" \
              --query "Service.Status" \
              --output text)
            echo "  attempt $i: $STATUS"
            if [ "$STATUS" = "RUNNING" ]; then
              echo "App Runner deployment complete."
              break
            fi
            if [ "$STATUS" = "CREATE_FAILED" ] || [ "$STATUS" = "UPDATE_FAILED" ] || [ "$STATUS" = "DELETED" ]; then
              echo "App Runner deployment failed with status: $STATUS"
              exit 1
            fi
            sleep 15
          done

      - name: Smoke test
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://${{ secrets.APPRUNNER_SERVICE_URL }}/health/live")
          echo "Health check returned HTTP $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Health check failed."
            exit 1
          fi
          echo "Deployment verified."
